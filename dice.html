<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekend Dice Master | CANSING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --accent: #f43f5e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        .apple-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
        #intro-overlay { position: fixed; inset: 0; z-index: 1000; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .intro-logo { font-size: 4rem; font-weight: 900; letter-spacing: -0.05em; background: linear-gradient(135deg, #4f46e5, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dice-box { width: 100px; height: 100px; perspective: 600px; margin: 0 auto; }
        .rolling { animation: diceRoll 0.3s infinite linear; }
        @keyframes diceRoll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .primary-btn { background: #000; color: #fff; transition: all 0.3s; }
        .primary-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2); }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="intro-overlay">
        <div class="intro-logo">DICE MASTER</div>
        <p class="text-slate-400 font-bold tracking-[0.4em] text-[10px] mt-4 uppercase">Senternet Technologies</p>
    </div>

    <header class="max-w-4xl mx-auto text-center mb-12 space-y-4">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-100 text-[10px] font-black uppercase tracking-widest text-slate-500">
            🎲 Rolling Real-Time
        </div>
        <h1 class="text-5xl font-black tracking-tighter text-slate-900">Weekend <span class="text-indigo-600">Points Race</span></h1>
        <p class="text-slate-500 font-medium">Auto-sync enabled. 3 rolls per round. Every point counts towards the 40 coin grand prize.</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <section class="max-w-md mx-auto mb-16">
            <div class="apple-shadow p-6 rounded-[2.5rem] bg-white border border-slate-100">
                <div class="flex gap-2">
                    <input type="number" id="sid-input" placeholder="Enter SID to Join" 
                        class="flex-1 p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none font-bold text-sm transition-all">
                    <button onclick="registerUser()" id="reg-btn" class="primary-btn px-6 rounded-2xl font-black text-[10px] tracking-widest uppercase">JOIN</button>
                </div>
            </div>
        </section>

        <section class="space-y-8">
            <div class="flex items-center justify-between px-2">
                <h2 class="text-2xl font-black tracking-tight flex items-center gap-3">
                    Live Leaderboard 
                    <span id="player-count" class="bg-indigo-100 text-indigo-600 text-[10px] px-3 py-1 rounded-full">0 PLAYERS</span>
                </h2>
            </div>

            <div id="player-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Data renders here -->
            </div>
        </section>
    </main>

    <!-- Game Modal -->
    <div id="game-modal" class="modal" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 apple-shadow border border-slate-100 text-center space-y-6 relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-900">✕</button>
            
            <div class="space-y-2">
                <img id="modal-avatar" src="" class="w-20 h-20 rounded-full mx-auto border-4 border-indigo-50 shadow-lg object-cover">
                <h2 id="modal-name" class="text-xl font-black truncate px-4">User</h2>
                <div class="flex justify-center gap-4">
                    <p class="text-[10px] font-black text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full uppercase" id="modal-points">0 Pts</p>
                    <p class="text-[10px] font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-full uppercase" id="modal-rounds">0 Rounds</p>
                </div>
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-6 space-y-6">
                <div class="dice-box flex items-center justify-center">
                    <div id="dice-visual" class="text-6xl">🎲</div>
                </div>
                
                <div class="flex justify-center gap-2" id="roll-history">
                    <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                    <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                    <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                </div>

                <button onclick="performRoll()" id="roll-action-btn" class="w-full primary-btn py-4 rounded-xl font-black text-xs tracking-widest uppercase">ROLL DICE</button>
            </div>
        </div>
    </div>

    <footer class="mt-20 border-t border-slate-100 py-10 text-center space-y-4">
        <p class="text-slate-900 text-[10px] font-black uppercase tracking-[0.4em]">Senternet Technologies</p>
        <p class="text-slate-400 text-[9px] font-bold uppercase tracking-widest">Aranthangi | WhatsApp: +91 81900 38085</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx_JdoTdZF1jA4MF3sNvXdEw431WR-PnKQiTUIEzviFMO0WM6aBLcZK9B48NqToV_XP/exec";
        let allPlayers = [];
        let activePlayer = null;
        let currentRolls = [];

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('intro-overlay').style.display = 'none', 800);
            }, 1500);
            loadPlayers();
        };

        async function registerUser() {
            const sid = document.getElementById('sid-input').value.trim();
            if(!sid) return;
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.innerText = "WAIT...";
            try {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://pay.starmakerstudios.com/rapid/user?category=6&id=${sid}&ts=${Date.now()}`)}`;
                const response = await fetch(proxy);
                const raw = await response.json();
                const data = JSON.parse(raw.contents);

                if(data.code === 0 && data.user) {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ sid: sid, name: data.user.stage_name, avatar: data.user.profile_image }) });
                    document.getElementById('sid-input').value = "";
                    loadPlayers();
                } else alert("Invalid SID");
            } catch (e) { alert("Error!"); }
            finally { btn.disabled = false; btn.innerText = "JOIN"; }
        }

        async function loadPlayers() {
            try {
                const res = await fetch(API_URL + "?action=read");
                allPlayers = await res.json();
                renderPlayers();
            } catch (e) { console.error("Update failed"); }
        }

        function renderPlayers() {
            const grid = document.getElementById('player-grid');
            document.getElementById('player-count').innerText = `${allPlayers.length} PLAYERS`;
            grid.innerHTML = '';
            
            allPlayers.sort((a,b) => b.points - a.points).forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "apple-shadow bg-white rounded-[2rem] p-4 text-center border border-slate-50 cursor-pointer hover:scale-[1.02] transition-all relative";
                card.onclick = () => openGameModal(p);
                
                card.innerHTML = `
                    <div class="relative mb-3">
                        <img src="${p.avatar}" class="w-16 h-16 rounded-full mx-auto border-2 border-slate-50 shadow-sm object-cover">
                        <div class="absolute -bottom-1 -right-1 bg-indigo-600 text-white text-[8px] px-1.5 py-0.5 rounded-md font-bold">R${p.rounds}</div>
                    </div>
                    <h4 class="font-bold text-slate-800 text-[11px] truncate uppercase px-1">${p.name}</h4>
                    <p class="text-indigo-600 font-black text-sm mt-1">${p.points} <span class="text-[8px] text-slate-300">PTS</span></p>
                `;
                grid.appendChild(card);
            });
        }

        function openGameModal(player) {
            activePlayer = player;
            currentRolls = [];
            document.getElementById('modal-avatar').src = player.avatar;
            document.getElementById('modal-name').innerText = player.name;
            document.getElementById('modal-points').innerText = `${player.points} Pts`;
            document.getElementById('modal-rounds').innerText = `${player.rounds} Rounds`;
            document.getElementById('dice-visual').innerText = "🎲";
            document.getElementById('game-modal').classList.add('active');
            updateUI();
        }

        function updateUI() {
            const history = document.getElementById('roll-history');
            history.innerHTML = '';
            for(let i=0; i<3; i++) {
                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full ${i < currentRolls.length ? 'bg-indigo-500' : 'bg-slate-200'}`;
                history.appendChild(dot);
            }
            document.getElementById('roll-action-btn').disabled = false;
            document.getElementById('roll-action-btn').innerText = "ROLL DICE";
        }

        function performRoll() {
            if(currentRolls.length >= 3) return;
            const dice = document.getElementById('dice-visual');
            const btn = document.getElementById('roll-action-btn');
            
            btn.disabled = true;
            dice.classList.add('rolling');
            
            const result = Math.floor(Math.random() * 6) + 1;
            const emojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

            setTimeout(async () => {
                dice.classList.remove('rolling');
                dice.innerText = emojis[result - 1];
                currentRolls.push(result);
                updateUI();

                if(currentRolls.length === 3) {
                    if(currentRolls.every(r => r === 6)) {
                        alert("Triple 6! Round Discarded 💀");
                        closeModal();
                    } else {
                        const sum = currentRolls.reduce((a, b) => a + b, 0);
                        // Instant sync
                        await syncPoints(activePlayer.sid, sum);
                        // Immediate reset for next round if user wants to play again
                        currentRolls = [];
                        updateUI();
                    }
                } else {
                    btn.disabled = false;
                }
            }, 600);
        }

        async function syncPoints(sid, pts) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ sid: sid, points: pts })
                });
                // Update local data immediately for feel
                const p = allPlayers.find(x => x.sid == sid);
                if(p) { 
                    p.points += pts; 
                    p.rounds += 1;
                    document.getElementById('modal-points').innerText = `${p.points} Pts`;
                    document.getElementById('modal-rounds').innerText = `${p.rounds} Rounds`;
                }
                renderPlayers();
            } catch (e) { console.error("Sync Error"); }
        }

        function closeModal() {
            document.getElementById('game-modal').classList.remove('active');
            activePlayer = null;
        }

        setInterval(loadPlayers, 10000); // 10s auto-refresh
    </script>
</body>
</html>
