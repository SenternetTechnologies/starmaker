<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Master | Cansing events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --indigo-deep: #4338ca; --slate-dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: var(--slate-dark); overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
        .apple-shadow { box-shadow: 0 20px 50px -12px rgba(0,0,0,0.08); }
        
        /* Loading Overlays */
        #intro-screen { position: fixed; inset: 0; z-index: 9999; background: #fff; display: flex; align-items: center; justify-content: center; }
        #skip-overlay { position: fixed; inset: 0; z-index: 9998; background: #000; display: none; align-items: center; justify-content: center; }
        
        .dice-animation { animation: roll 0.6s infinite; }
        @keyframes roll {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(180deg) translateY(-10px); }
            100% { transform: rotate(360deg) translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { background: var(--indigo-deep); color: white; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="intro-screen">
        <div class="text-center">
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExdDhxNndkOWt3enNkcWlqamNpN3FkNTBqOTJyd2E1dGJkdnFncXpiZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/XPf57biefJUjpbpV1l/giphy.gif" class="w-64 h-64 object-contain rounded-3xl mb-4" alt="Loading">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Initializing Race...</h1>
        </div>
    </div>

    <div id="skip-overlay">
        <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3Z2lpZGN2ZXZpMDJyZzM0dDRqcXVoMGIzdmQ4bjJsYm9razFkYWw0cCZlcD12MV9naWZzX3lEJTUzJTI2Y3Q9Zw/qmxASwVqFEyQ0oGuky/giphy.gif" class="w-full h-full object-cover opacity-80">
        <button onclick="closeSkipOverlay()" class="absolute bottom-10 right-10 bg-white/20 hover:bg-white/40 backdrop-blur-xl border border-white/30 text-white px-8 py-3 rounded-full font-bold text-sm tracking-widest uppercase transition-all">Skip Experience</button>
    </div>

    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-indigo-200">D</div>
            <span class="font-black text-xl tracking-tighter uppercase hidden md:block">DiceMaster</span>
        </div>
        <button onclick="toggleModal('join-modal', true)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-full font-bold text-xs tracking-widest uppercase shadow-lg shadow-indigo-100 transition-all active:scale-95">
            Join Race
        </button>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div id="top-champion" class="mb-12">
            </div>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-black tracking-tight">Leaderboard</h2>
                    <div class="flex gap-2">
                        <select id="sort-filter" onchange="renderLeaderboard()" class="bg-white border-none apple-shadow px-4 py-2 rounded-xl text-[10px] font-black uppercase outline-none">
                            <option value="points">Points</option>
                            <option value="name">A-Z</option>
                        </select>
                    </div>
                </div>

                <div id="leaderboard-list" class="space-y-3">
                    </div>
            </div>

            <div class="space-y-8">
                <div class="glass-card rounded-[2rem] p-6 apple-shadow">
                    <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-4">Recent Joins</h3>
                    <div id="recent-joins" class="space-y-4">
                        </div>
                </div>

                <div id="local-history-card" class="bg-indigo-900 rounded-[2rem] p-6 apple-shadow text-white hidden">
                    <h3 class="font-black text-xs uppercase tracking-widest opacity-60 mb-4">Your Recent Play</h3>
                    <div id="local-history-content"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="join-modal" class="fixed inset-0 z- hidden flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 apple-shadow relative">
            <button onclick="toggleModal('join-modal', false)" class="absolute top-8 right-8 text-slate-400">✕</button>
            <h2 class="text-3xl font-black tracking-tighter mb-2">Enter the Arena</h2>
            <p class="text-slate-500 text-sm mb-8">Enter your SID to sync profile and points.</p>
            <input type="number" id="sid-input" placeholder="Starmaker SID" class="w-full p-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none font-bold mb-4 transition-all">
            <button id="reg-btn" onclick="registerUser()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black tracking-widest uppercase hover:bg-indigo-600 transition-all">Verify & Join</button>
        </div>
    </div>

    <div id="game-modal" class="fixed inset-0 z- hidden flex items-center justify-center p-6 bg-indigo-950/60 backdrop-blur-xl">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-8 apple-shadow text-center relative overflow-hidden">
            <div id="dice-container" class="py-10">
                <div id="dice-visual" class="text-8xl mb-6">🎲</div>
                <div id="roll-status" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Ready to Roll</div>
            </div>
            
            <div class="flex justify-center gap-2 mb-8" id="dots-progress">
                <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                <div class="w-2 h-2 rounded-full bg-slate-200"></div>
            </div>

            <button id="roll-btn" onclick="handleRoll()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black tracking-widest uppercase shadow-xl shadow-indigo-200">Roll Dice</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx_JdoTdZF1jA4MF3sNvXdEw431WR-PnKQiTUIEzviFMO0WM6aBLcZK9B48NqToV_XP/exec";
        let players = [];
        let activePlayer = null;
        let sessionRolls = [];

        window.onload = () => {
            // Intro Logic
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                if(!localStorage.getItem('exp_viewed')) {
                    document.getElementById('skip-overlay').style.display = 'flex';
                }
            }, 2500);

            loadData();
            checkCache();
        };

        function closeSkipOverlay() {
            document.getElementById('skip-overlay').style.display = 'none';
            localStorage.setItem('exp_viewed', 'true');
        }

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL + "?action=read");
                players = await res.json();
                renderLeaderboard();
                renderRecents();
            } catch (e) { console.error("Load failed"); }
        }

        function renderLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const topSection = document.getElementById('top-champion');
            const sortBy = document.getElementById('sort-filter').value;

            let sorted = [...players].sort((a,b) => b.points - a.points);
            if(sortBy === 'name') sorted = [...players].sort((a,b) => a.name.localeCompare(b.name));

            // Render Champion
            if(sorted.length > 0) {
                const champ = sorted;
                topSection.innerHTML = `
                    <div class="bg-indigo-600 rounded-[3rem] p-1 shadow-2xl shadow-indigo-200">
                        <div class="bg-white rounded-[2.8rem] p-8 flex flex-col md:flex-row items-center gap-8">
                            <div class="relative">
                                <img src="${champ.avatar}" class="w-32 h-32 rounded-[2rem] object-cover shadow-2xl">
                                <div class="absolute -top-4 -left-4 bg-yellow-400 text-white px-4 py-1 rounded-full font-black text-[10px] uppercase">Rank #1</div>
                            </div>
                            <div class="text-center md:text-left flex-1">
                                <h2 class="text-4xl font-black tracking-tighter">${champ.name}</h2>
                                <p class="text-slate-400 font-bold text-sm">Leading with ${champ.points} points across ${champ.rounds} rounds</p>
                            </div>
                            <button onclick="playWith('${champ.sid}')" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Challenge</button>
                        </div>
                    </div>
                `;
            }

            // Render List
            list.innerHTML = sorted.slice(1).map((p, i) => `
                <div onclick="playWith('${p.sid}')" class="glass-card p-4 rounded-3xl flex items-center justify-between hover:scale-[1.01] transition-all cursor-pointer group">
                    <div class="flex items-center gap-4">
                        <span class="w-6 text-xs font-black text-slate-300">#${i+2}</span>
                        <img src="${p.avatar}" class="w-12 h-12 rounded-2xl object-cover">
                        <div>
                            <h4 class="font-bold text-sm group-hover:text-indigo-600 transition-colors">${p.name}</h4>
                            <p class="text-[10px] text-slate-400 font-black uppercase">Rounds: ${p.rounds}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-indigo-600">${p.points}</p>
                        <p class="text-[8px] font-black uppercase text-slate-300 tracking-widest">Points</p>
                    </div>
                </div>
            `).join('');
        }

        function renderRecents() {
            const container = document.getElementById('recent-joins');
            const recents = [...players].reverse().slice(0, 5);
            container.innerHTML = recents.map(p => `
                <div class="flex items-center gap-3">
                    <img src="${p.avatar}" class="w-8 h-8 rounded-full border-2 border-white shadow-sm">
                    <div class="truncate">
                        <p class="text-[11px] font-bold truncate">${p.name}</p>
                        <p class="text-[9px] text-slate-400">Just joined the race</p>
                    </div>
                </div>
            `).join('');
        }

        function playWith(sid) {
            activePlayer = players.find(p => p.sid == sid);
            if(!activePlayer) return;
            sessionRolls = [];
            document.getElementById('roll-status').innerText = "Ready to Roll";
            updateDots();
            toggleModal('game-modal', true);
        }

        function updateDots() {
            const dots = document.getElementById('dots-progress').children;
            for(let i=0; i<3; i++) {
                dots[i].className = `w-2 h-2 rounded-full transition-all ${i < sessionRolls.length ? 'bg-indigo-600 scale-125' : 'bg-slate-200'}`;
            }
        }

        async function handleRoll() {
            if(sessionRolls.length >= 3) return;
            
            const btn = document.getElementById('roll-btn');
            const visual = document.getElementById('dice-visual');
            
            btn.disabled = true;
            visual.classList.add('dice-animation');
            document.getElementById('roll-status').innerText = "Rolling...";

            setTimeout(async () => {
                visual.classList.remove('dice-animation');
                const val = Math.floor(Math.random() * 6) + 1;
                const faces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                visual.innerText = faces[val-1];
                sessionRolls.push(val);
                updateDots();

                if(sessionRolls.length === 3) {
                    btn.innerText = "Syncing Points...";
                    const total = sessionRolls.reduce((a,b) => a+b, 0);
                    
                    // Update Local History
                    saveToCache(activePlayer.name, total);

                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ sid: activePlayer.sid, points: total }) });
                    
                    setTimeout(() => {
                        toggleModal('game-modal', false);
                        loadData();
                        btn.disabled = false;
                        btn.innerText = "Roll Dice";
                    }, 1000);
                } else {
                    btn.disabled = false;
                    document.getElementById('roll-status').innerText = "Next Roll Ready";
                }
            }, 800);
        }

        function saveToCache(name, pts) {
            const history = JSON.parse(localStorage.getItem('dice_history') || '[]');
            history.unshift({ name, pts, time: new Date().toLocaleTimeString() });
            localStorage.setItem('dice_history', JSON.stringify(history.slice(0, 5)));
            checkCache();
        }

        function checkCache() {
            const history = JSON.parse(localStorage.getItem('dice_history') || '[]');
            const card = document.getElementById('local-history-card');
            if(history.length > 0) {
                card.classList.remove('hidden');
                document.getElementById('local-history-content').innerHTML = history.map(h => `
                    <div class="flex justify-between items-center text-[11px] border-b border-white/10 py-2">
                        <span>${h.name} rolled ${h.pts}</span>
                        <span class="opacity-50">${h.time}</span>
                    </div>
                `).join('');
            }
        }

        async function registerUser() {
            const sid = document.getElementById('sid-input').value;
            const btn = document.getElementById('reg-btn');
            if(!sid) return;
            
            btn.innerText = "Verifying...";
            try {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://pay.starmakerstudios.com/rapid/user?category=6&id=${sid}`)}`;
                const raw = await fetch(proxy).then(r => r.json());
                const data = JSON.parse(raw.contents);

                if(data.user) {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ sid: sid, name: data.user.stage_name, avatar: data.user.profile_image }) });
                    toggleModal('join-modal', false);
                    loadData();
                } else { alert("User not found!"); }
            } catch (e) { alert("Network Error"); }
            btn.innerText = "Verify & Join";
        }

        setInterval(loadData, 30000);
    </script>
</body>
</html>
